# Trigger optimizer hyperparameters (AgentPoison "ap" algorithm).
# Defaults sized for CPU / Apple MPS; scale up for the full experiment.

encoder_model: "BAAI/bge-small-en-v1.5"   # MUST match the retriever's embed model

num_adv_passage_tokens: 5                  # length of the optimized trigger
num_iter: 50                               # outer HotFlip iterations
num_grad_iter: 8                           # batches per gradient step
num_cand: 30                               # HotFlip top-k candidates per flip
per_batch_size: 8                          # queries per gradient batch
algo: "ap"                                 # "ap" (cluster dist) | "cpa" (similarity)

ppl_filter: false                          # GPT-2 coherence filter
ppl_oversample: 10                         # only used when ppl_filter is true

n_components: 5                            # GMM components over db embeddings
exclude_up_to: 1000                        # mask low-id special/reserved tokens

golden_trigger: null                       # optional init string; null = [MASK]*N

seed: 0
device: null                               # null = auto (cuda > mps > cpu)
cache_base_dir: "data/attacks/_cache"
artifacts_dir: "data/attacks"
