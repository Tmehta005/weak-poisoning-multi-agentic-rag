  query: 'Does IBM DataPower Gateway Appliance support the HTTP CONNECT method?


    Does IBM DataPower Gateway Appliance support the HTTP CONNECT method for SSL proxy
    requests?'
  ground_truth_answer: 'SSL Proxy requests will work using the CONNECT method for
    SSL Tunneling when using a Multi-Protocol Gateway when configuring in a User Agent''s
    HTTP Proxy Policy.


    The XML Firewall service is not designed to use the CONNECT method for SSL Tunneling.'
