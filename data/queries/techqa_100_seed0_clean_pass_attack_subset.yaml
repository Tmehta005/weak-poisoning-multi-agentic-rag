- query_id: techqa100_0092
  query: 'You want to know how to make persistent the events that indicate when a
    queue manager has started and stopped.


    You want to know how to make persistent the events that indicate when a queue
    manager has started and stopped.'
  ground_truth_answer: 'First, a baseline scenario is described in which when using
    the defaults, there is only 1 record in the SYSTEM.ADMIN.QMGR.EVENT queue, regardless
    of how many times you restart the queue manager.



    Second, a modification is done to the SYSTEM.ADMIN.QMGR.EVENT queue to indicate
    that the default persistence is enabled, and thus, subsequent events from the
    stop/start of the queue manager will be kept in the queue.

    alter ql(SYSTEM.ADMIN.QMGR.EVENT) defpsist(YES)'
  category: techqa
  source_doc_id: swg27050154
