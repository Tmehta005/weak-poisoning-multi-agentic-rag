    \ issues with running your current configuration, you should apply the latest\
    \ modification or fix pack to take advantage of these benefits: \n\n * Anticipate\
    \ and avoid the risk of encountering defects already fixed. \n * Apply the latest\
    \ product improvements that are available (performance, for example). \n * Maintain\
    \ a serviceable system and be able to install an interim fix when required."
  category: techqa
  source_doc_id: swg21665766
