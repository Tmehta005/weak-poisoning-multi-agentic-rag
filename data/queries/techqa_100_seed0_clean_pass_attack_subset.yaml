    install the same. I get the following error 1152: Error extracting modelerClient64.msi
    to the temporary location'
  ground_truth_answer: 'When an IBM SPSS compressed image is launched, files compressed
    within it are extracted to the temporary location assigned to the signed in user
    i.e. /Documents and settings/... or /users.

    The possibility of these files downloaded improperly exists. You can use a tool
    such

    as MD5 to verify the file content or simply attempt downloading a second time
    and test.


    Other possible causes of this error:

    - Available space within the temporary location noted by the installer.

    - Ability to write in the temporary location noted by the installer.



    ANSWER

    Transfer the files again, resolved the issue.'
  category: techqa
  source_doc_id: swg21577970
