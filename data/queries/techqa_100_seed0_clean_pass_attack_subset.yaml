- query_id: techqa100_0089
  query: 'Why is OCR is putting multiple lines on one line?


    I am running an APT application, and multiple detail lines are getting put on
    a single line within my .TXT file.  Is there something I can do about this?'
  ground_truth_answer: "Add the following action prior to NormalizeCCO. \n\n * \n\
    \ * \n\nThe first parameter is the percentage of a line that two words must be\
    \ offset to be considered as separate lines. If the value is not set, the default\
    \ is 50. In the example, if two words are vertically offset by more than 35% of\
    \ the height of the words, then they are considered to be on separate lines. Lower\
    \ values are more likely to split words into separate lines. Higher values are\
    \ more likely to merge words into a single line."
  category: techqa
  source_doc_id: swg21701910
