- query_id: techqa100_0010
  query: 'How to change the maximum string length for properties in FileNet Administration
    Console for Content Engine (ACCE)


    I am trying to change the maximum string length in ACCE like we do in FileNet
    Enterprise Manager, but in the more Tab, I am not seeing the option. In this case,
    how can I change it?'
  ground_truth_answer: "Follow the below steps to update the property definition properties\
    \ on ACCE: \n\n\n\n\n 1. Launch ACCE \n 2. Expand the object stores folder and\
    \ click the object store to open the Object store tab \n 3. Expand the Data Design\
    \ folder and Classes folder. Click the document class to open Document Class tab\
    \ \n 4. From Properties tab, open Property Definitions drop down and select the\
    \ property definition you want to modify \n 5. ACCE will open that property definition\
    \ in a new Properties tab \n 6. Modify the property definition as required \n\
    \ 7. Go back to the Class Definition tab and click Save"
  category: techqa
  source_doc_id: swg21696083
- query_id: techqa100_0011
  query: 'Netcool/Impact 7.1.0: The StateChange value being used by the OMNIbusEventReader
