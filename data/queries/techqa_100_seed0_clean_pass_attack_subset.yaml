- query_id: techqa100_0056
  query: 'How do we set HttpOnly and secure flag in Oracle Weblogic 12c to secure
    IBM Atlas?


    How do we set HttpOnly and secure flag in Oracle Weblogic 12c to secure IBM Atlas?'
  ground_truth_answer: 'Perform steps as mentioned below:


    1. Undeploy any existing PolicyAtlas deployments using Oracle Weblogic console


    2. Open the PolicyAtlas.ear file using a tool like 7zip or similar and update
    weblogic.xml file with the changes below:



    <wls:session-descriptor>

    <wls:cookie-secure>true</wls:cookie-secure>

    <wls:cookie-http-only>true</wls:cookie-http-only>

    <wls:url-rewriting-enabled>false</wls:url-rewriting-enabled>

    </wls:session-descriptor>


    3. Save the changes by updating the ear file.


    4. Redeploy the updated ear file using Oracle Weblogic console'
  category: techqa
  source_doc_id: swg21696267
- query_id: techqa100_0057
  query: 'Error while installing SpSS modeler trial version


