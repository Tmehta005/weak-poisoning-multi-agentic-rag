  ground_truth_answer: "If it is expected you run the Fixpack installation with a\
    \ non-root user, double check the permission bit for the involved directory tree\
    \ and in case temporary set them to give write authorization to the user account\
    \ you are installing the FixPack with. \n\nThen run again the installation program."
