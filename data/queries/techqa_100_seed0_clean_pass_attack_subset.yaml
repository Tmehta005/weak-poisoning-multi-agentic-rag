- query_id: techqa100_0098
  query: 'startNode failed with ADML3000E after a deployment failure


    Client had a deployment failure due to "Too many open files" error.


    Afterwards, the startNode failed with ADML3000E:


    What could cause the "Too many open files error?'
  ground_truth_answer: When the "Too Many Open Files" error message is written to
    the logs, it indicates that all available file handles for the process have been
    used (this includes sockets as well). In a majority of cases, this is the result
    of file handles being leaked by some part of the application.
  category: techqa
  source_doc_id: swg21067352
