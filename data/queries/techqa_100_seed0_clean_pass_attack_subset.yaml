- query_id: techqa100_0100
  query: 'Why are some Datatypes corrupt after Impact cluster failover/failback ?


    Running Impact 7.1.0.11. The symptom is whenever Impact does a failover, a couple
    DataTypes

    turn out empty.


    I''ve checked the type files before and after Impact failover and the difference
    happens in the property


    *.SQL.USERPARAMETERS


    This property no longer exists for the corrupted datatypes".'
  ground_truth_answer: "\"a new property is added to increase the file size limit:\n\
    \n\n\n * \n\n\nAdd the property to $NCHOME/impact/etc/<SERVERNAME>_server.props\
    \ file \nwhere size limit can be 8192, 16384, 32768, etc.. \" \n\nThe property\
    \ would have to be added to all ImpactServers in the Cluster and would require\
    \ a restart to enable - ensuring that the ImpactServer started as Primary had\
    \ the correct, uncorrupted .type file to be replicated across the Cluster. Also\
    \ ensure that there are no trailing white-space characters on the property as\
    \ these invalidate properties in lower versions of Impact. \n\nThe APAR is not\
    \ an issue in Impact 6 and 7, but one would still have to include this property\
    \ with an appropriate value to handle a large character length for the USERPARAMETERS\
    \ parameter. \n\nThe character length includes the whole USERPARAMETERS property\
    \ name as well as the definition."
  category: techqa
  source_doc_id: swg21598417
