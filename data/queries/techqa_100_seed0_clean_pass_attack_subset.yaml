    Example:


    export LIBPATH=$LIBPATH:/usr/lpp/ixm/xslt4c-1_11/lib/'
  category: techqa
  source_doc_id: swg21988389
- query_id: techqa100_0040
  query: "Why is the reload() not clearing the attribute cache so I can see my newly\
    \ updated LDAP data in real time?\n\nYou are leveraging the reload() functionality\
    \ as described in the blog post:\n  https://www.ibm.com/developerworks/community/blogs/PortalL2Thoughts/entry/how_to_programatically_refresh_data_from_ldap64?lang=en\n\
    \nto refresh the attribute cache after a change has been made to data within your\
    \ LDAP. The purpose of this reload() is to update the data in real time on the\
    \ Portal server. You discover that you are calling the reload(); however, the\
    \ newly updated data is not immediately available to the application. Why is that?"
  ground_truth_answer: "If base entry and name in repository is different and\n  \
    \ clearCache functionality is used with clearEntity mode then\n   virtual member\
    \ manager (VMM) still looks in the cache and gets\n   the entity from the cache\
    \ instead of fetching it from the LDAP\n   server."
  category: techqa
  source_doc_id: swg1PI47826
- query_id: techqa100_0041
  query: 'How to refresh a DataPower WebService Proxy which WSDL got changed?


    I have made changes to a WSDL stored in DP local filesystem.


    How can I make the WSP reflect this change since DataPower Gateway 7.1.0 WebService
    Proxy WebGUI doesn''t offer the "Refresh" button anymore?


    Is there a best practice to refresh the WSP if I modified my WSDL?'
  ground_truth_answer: "In a WS Proxy, you can refresh WSDL from an URL using WSDL\
    \ Cache policy. However, if the WSDL is hosted on the DataPower appliance, such\
    \ as in local:///, rather than on an external URL, the WSDL Cache Policy does\
    \ not apply. \n\nFor instance, changes made to local:///test.wsdl are not picked\
    \ up by WS Proxy although there is a WSDL Cache policy setting the URL Match expression\
