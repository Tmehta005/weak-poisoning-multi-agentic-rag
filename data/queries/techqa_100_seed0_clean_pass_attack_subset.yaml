    \ is 10. The sharing conversations value is \nnegotiated between MQ server and\
    \ DataPower and the lower value takes effect. However, in current versions of\
    \ the DataPower firmware, the sharing conversations setting of 1 is treated as\
    \ 0 when negotiating with MQ server."
