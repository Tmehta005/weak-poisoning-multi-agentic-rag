- query_id: techqa100_0094
  query: 'Java.io.NotSerializableException in WAS


    We are experiencing the Java.io.NotSerializableException exception. I see this
    error: WTRN0047E:java.io.NotSerializableException. Anyone experienced this before?'
  ground_truth_answer: 'With persistent sessions enabled, any object that is put into
    the HTTPSession must implement the serializable interface in order for session
    manager to store the session data outside of JVM.


    When PMI is enabled, there is a counter for session data size. In order to evaluate
    this counter, the session data must be serialized into a byte array stream. Any
    object that is put into the HTTPSession must implement the serializable interface
    in order for session manager to convert the session data objects into byte array
    stream.'
  category: techqa
  source_doc_id: swg21066791
