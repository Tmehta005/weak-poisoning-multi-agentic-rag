- query_id: techqa100_0086
  query: 'Problem with Postal database in Parascript


    Hi


    i am working with Parascript and i have installed successfully in my local system
    by folloing this guide [ Parascript FieldScript for Taskmaster Guide ]


    here i can able to create vocabulary file, but storing multiple values into this
    the values are overridden and i do not understand how to create a postal database
    and access it


    is that postal database is separate component ,,?? do we need to get somewhere
    and install ,,? they just mention in Guide the use of actions only


    and does this parascript really helps to get better recognize.'
  ground_truth_answer: The address information in the USPS database on the data disk
    is automatically disabled 105 days after the date of issue. IBM refreshes the
    data disk on the 14th day of every month, or the previous business day. You must
    ensure that you obtain the refreshed data from Passport Advantage on a regular
    schedule so that you avoid issues that are associated with disabled address information.
  category: techqa
  source_doc_id: swg24031674
- query_id: techqa100_0087
  query: 'Why Plug-in log file reports an error message after install & configure
    the WebSphere Plugin 8.5 version on a Apache 2.4 webserver.


    During web server start-up, errors like the following will be logged into the
    Plug-in log file (http_plugin.log):


    ERROR: lib_security: loadSecurityLibrary: Failed to load gsk library from /opt/IBM/WebSphere/Plugins/gsk8/gsk8_64
    ERROR: ws_transport: transportInitializeSecurity: Unable to load security library
    ERROR: ws_server: serverAddTransport: Failed to initialize security ERROR: ws_server:
    serverAddTransport: HTTPS Transport is skipped


    Note: This is after install & configure the WebSphere Plugin 8.5 version on a
    Apache 2.4 webserver  on a Linux platform'
  ground_truth_answer: To resolve the problem, you must set the LD_LIBRARY_PATH environment
    variable to point to the library directory of the GSKit that comes with the IBM
    web server Plug-in. The precise directory location will depend of the version
    of Plug-in, and on the bit depth being used (32-bit or 64-bit).
  category: techqa
  source_doc_id: swg21600618
- query_id: techqa100_0088
  query: 'Error TASK001X while upgrading Portal 8.0.0.1 to 8.0.0.1 CF14 during import-nodes
    sub-task


    While attempting to upgrade Portal to CF14 the upgrade fails during the import-nodes
