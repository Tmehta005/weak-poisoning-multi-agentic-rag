- query_id: techqa100_0083
  query: 'Cognos Analytics - Images not displayed in PDF/Excel, working in HTML


    I''ve just completed an upgrade to Cognos Analytics 11.0.3. When running existing
    reports in HTML, the images are displayed but when I try to run them in PDF/Excel
    they are not.'
  ground_truth_answer: "Open up IIS 7.5 \n 2. Click on the root folder of your Cognos\
    \ installation (E.g. C1021GA) in the navigation pane on the left side \n 3. When\
    \ the root folder is selected, double-click 'Authentication' \n 4. Ensure that\
    \ anonymous access is enabled \n 5. Repeat steps 3 and 4 for the image folder\
    \ and it's parent folder. \n 6. If the user is concerned about security, they\
    \ may want to restrict the child-folders (E.g. cgi-bin) and change the authentication\
    \ settings accordingly \n 7. Run the report in export as Excel 2007 and PDF"
