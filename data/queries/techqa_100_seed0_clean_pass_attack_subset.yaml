- query_id: techqa100_0081
  query: "Crash happened due to \"PI50993:Apache HTTPComponents vulnerabilities in\
    \ WebSphere Application Server (CVE-2012-6153, CVE-2014-3577)\"\n\nCrash happened\
    \ due to \"PI50993:Apache HTTPComponents vulnerabilities in WebSphere Application\
    \ Server (CVE-2012-6153, CVE-2014-3577)\"\n\nDetails of gpf crash events: A VerifyError\
    \ was thrown due to \"Inaccessible class\" at offset 39(0x27) of the method executeInternal(Lorg/springframework/http/HttpHeaders;[B)Lorg/springfram\
    \ ework/http/client/ClientHttpResponse of the above class org/springframework/http/client/HttpComponentsClientHttpRequest.\n\
    \nLooking at method the bytecodes :\n\n31 invokespecial 15 org/apache/http/entity/ByteArrayEntity.([B)V\
    \ 34 astore 4 36 aload3 37 aload 4 39 invokeinterface2 41 invokeinterface 16 org/apache/http/HttpEntityEnclosingRequest.setEntity(Lorg/apache/http/Ht\
    \ tpEntity;)V\n\nThe above sequence of bytecodes indicates it created an instance\
    \ of org/apache/http/entity/ByteArrayEntity, trying to cast it to type Lorg/apache/http/HttpEntity;\
    \ which in turns led to the \"Inaccessible class\" VerifyError message.\n\nIt\
    \ is clear that class org/apache/http/HttpEntity was not loaded at all:\n\n  \
    \  allclasses | grep org/apache/http/HttpEntity"
  ground_truth_answer: There would be NoClassDefFoundError observed after applying
    the fix because the API in HTTPCore and HTTPClient libraries are no long visible
    to application. To resolve this error, application may need to be updated with
    HTTPCore and HTTPClient libraries bundled.
  category: techqa
  source_doc_id: swg24041394
- query_id: techqa100_0082
