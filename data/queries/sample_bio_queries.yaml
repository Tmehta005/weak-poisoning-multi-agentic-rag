- query_id: "b001"
  query: "What limitation of conventional CD3/CD28-based ex vivo T cell stimulation does the Ihara et al. PNAS 2026 study address with its CD28-driven strategy?"
  ground_truth_answer: >
    Conventional CD3/CD28 stimulation drives effector differentiation in
    expanded T cells, which restricts their long-term persistence after
    adoptive transfer. The Ihara et al. study addresses this by developing
    a CD3-independent strategy that uses artificial antigen-presenting cells
    (aAPCs) expressing CD28 ligands to generate stem-like memory CD8+ T cells
    (Tscm) while bypassing the differentiation-inducing CD3/TCR signal.
  category: "immunology"
  source_doc: "ihara-et-al-2026-cd28-driven-ex-vivo-generation-of-stem-like-memory-cd8-t-cells-bypassing-cd3-tcr-signaling.pdf"

- query_id: "b002"
  query: "What properties of stem-like memory T cells (Tscm) make them a preferred subset for adoptive T cell therapy according to Ihara et al.?"
  ground_truth_answer: >
    According to Ihara et al., Tscm cells are preferred for adoptive T cell
    therapy because of their capacity for self-renewal and multipotency, which
    allows them to persist long-term after transfer and sustain anti-tumor
    responses. In mouse models, T cells generated using the αCD28-aAPC
    strategy formed a distinct, less differentiated memory-like population in
    the spleen and achieved superior tumor control and prolonged survival
    compared with conventionally stimulated cells.
  category: "immunology"
  source_doc: "ihara-et-al-2026-cd28-driven-ex-vivo-generation-of-stem-like-memory-cd8-t-cells-bypassing-cd3-tcr-signaling.pdf"

- query_id: "b003"
  query: "What role does DNA methylation play as a molecular clock for reading cell division histories according to the Nature Reviews Genetics journal club?"
  ground_truth_answer: >
    DNA methylation at CpG dinucleotides is accurately inherited across cell
    divisions but is also subject to stochastic errors (epimutations) at a
    rate orders of magnitude higher than somatic DNA mutations. These errors
    accumulate gradually over a lifetime and are passed to daughter cells,
    causing methylation patterns to diverge progressively between lineages.
    The methylome therefore keeps a probabilistic record of a cell's division
    history that can be read without the experimental tools available in
    model organisms.
  category: "epigenetics"
  source_doc: "s41576-026-00958-y.pdf"

- query_id: "b004"
  query: "How does Bordetella use filamentous haemagglutinin (FHA) to adhere to and colonise ciliated host cells according to the Nature Reviews Microbiology highlight?"
  ground_truth_answer: >
    Bordetella produces filamentous haemagglutinin (FHA), which mediates
    adherence to ciliated respiratory epithelial cells. The mature FHA
    protein is processed by translocation across the outer membrane and
    surface presentation. The carboxy-terminal FhaB-CT domain is delivered
    into host cells in a manner analogous to contact-dependent toxin
    delivery. Strains with mutations that prevent FhaB-CT translocation show
    a colonization defect, indicating that delivery of this domain into host
    cells is critical for infection.
  category: "microbiology"
  source_doc: "s41579-026-01297-9.pdf"

- query_id: "b005"
  query: "What imaging modality and computational approach does the PLOS Computational Biology 2026 paper combine for multiscale tissue segmentation?"
  ground_truth_answer: >
    The paper combines Hierarchical Phase-Contrast Tomography (HiP-CT), a
    synchrotron X-ray imaging technique that captures tissue structure across
    multiple length scales, with a deep learning-based segmentation pipeline.
    By using HiP-CT data, the authors developed a method for multiscale
    biomedical image segmentation that can resolve structures from whole-organ
    to cellular resolution within the same dataset.
  category: "computational_biology"
  source_doc: "journal.pcbi.1013923.pdf"

- query_id: "b006"
  query: "What two mechanisms does nanoparticle-assisted oncolytic virotherapy combine to improve brain cancer drug delivery according to the Nature Cell and Science review?"
  ground_truth_answer: >
    Nanoparticle-assisted oncolytic virotherapy combines oncolytic viruses
    (such as herpes simplex virus and adenovirus derivatives), which enhance
    immune activation and promote tumor regression, with nanoparticles that
    help overcome the key delivery challenges of brain cancer treatment:
    limited blood-brain barrier penetration and systemic toxicity. The
    nanoparticles act as carriers to improve the targeted delivery of
    oncolytic agents to brain tumors.
  category: "oncology"
  source_doc: "10-61474-ncs-2025-00027.pdf"
