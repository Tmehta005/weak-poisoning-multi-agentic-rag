- query_id: techqa100_0043
  query: 'Why do I get "OSS version is not suitable for installation" when attempting
    to install the MQ 5.3.1 base version on a HP Integrity NonStop Server BladeSystem?


    I am trying to install the MQ 5.3.1 base version on a HP Integrity NonStop Server
    BladeSystem, but it complains saying that the "OSS version is not suitable for
    installation". My OSS version is J06.14 and it looks to be a supported version
    according to the System Requirements site:


    http://www-01.ibm.com/support/docview.wss?uid=swg27006797


    Why am I getting this error message?'
  ground_truth_answer: 'For the HP Integrity NonStop Server H-Series systems, the
    following system

    software versions are the minimum mandatory level for V5.3.1.12:


    - H06.23.01 or later'
  category: techqa
  source_doc_id: swg27048240
