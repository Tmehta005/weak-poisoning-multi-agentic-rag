- query_id: techqa100_0004
  query: 'Is Java 8 supported for BPM?


    I understand that support for Java 6 on WebSphere Application Server is ending
    April 2018, see: http://www-01.ibm.com/support/docview.wss?uid=swg21999583


    Now I can switch to Java 7. But what about Java 8? Does BPM support Java 8?'
  ground_truth_answer: IBM BPM V8.5.6 and V8.5.7 support Java 6 and Java 7, but do
    not support Java 8.
  category: techqa
  source_doc_id: swg21639640
