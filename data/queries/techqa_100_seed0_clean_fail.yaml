- query_id: techqa100_0059
  query: 'Why does our Websphere application server hang when we apply Microsoft patch
    on our database server?


    Why does our Websphere application server hang when we apply Microsoft patch on
    our database server?'
  ground_truth_answer: "Immediately purge the pool by invoking the purgePoolContents\
    \ operation of the data source MBean with the immediate option:\n    Using Jacl:\n\
    \    $AdminControl invoke $ds purgePoolContents immediate\n    \n    \n    Using\
    \ Jython:\n    AdminControl.invoke(ds, \"purgePoolContents\", \"immediate\")\n\
    \    \n    \n\nIf the purge operation is successful, no response will be observed.\
    \ If the purge operation is not successful, the response will indicate a possible\
    \ reason for failure."
  category: techqa
  source_doc_id: swg21220832
